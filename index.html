function AllocationSummary({ bucketAnnual, bucketMonthlyAvg, incomeAnnual, incomeMonthlyAvg, groupTotals, groups, netAnnual = 0, grossIncomeAnnual = 0, retHsaAnnual = 0, otherDeductAnnual = 0, payrollActive = false }) {
  /* Fix 4.2: when payroll deductions are set, the WHOLE component uses gross as
     the denominator and shows pretax dollars as their own bar segments, so the
     bar, legend, and rules all share one baseline (gross). Without deductions
     it behaves exactly as before (take-home baseline). */
  const denom      = (payrollActive ? grossIncomeAnnual : incomeAnnual) || 1;
  /* Fix #2: fold net (under/over allocation) into Saving so leftover cash is saved. */
  const saveWithNet = bucketAnnual.save + netAnnual;
  const saveAvg     = saveWithNet / 12;
  const seg        = n => Math.max(0, (n / denom) * 100);
  const showUnalloc = bucketAnnual.unalloc > 0;
  const showPretax  = payrollActive && retHsaAnnual > 0;
  const showOther   = payrollActive && otherDeductAnnual > 0;
  const housingGroup = groupTotals.find((gt, i) => groups[i] && groups[i].name.toLowerCase() === 'housing');
  const housingPct   = housingGroup ? housingGroup.annual / denom : 0;
  const savingsRateNum = saveWithNet + retHsaAnnual;   /* pretax 401k/HSA count as saving */
  const savingRate     = savingsRateNum / denom;
  const givingRate     = bucketAnnual.give / denom;
  return (
    <div className="alloc">
      <div className="alloc-head">
        <h3>Allocation of every dollar earned</h3>
        <div className="income">
          {payrollActive
            ? fmtAccurate(grossIncomeAnnual / 12) + ' gross avg / month · ' + fmt(grossIncomeAnnual) + ' gross / year'
            : fmtAccurate(incomeMonthlyAvg) + ' avg / month · ' + fmt(incomeAnnual) + ' / year'}
        </div>
      </div>
      <div className="alloc-bar">
        <div className="seg-needs" style={{ width: seg(bucketAnnual.needs) + '%' }}></div>
        <div className="seg-wants" style={{ width: seg(bucketAnnual.wants) + '%' }}></div>
        <div className="seg-save"  style={{ width: seg(saveWithNet)        + '%' }}></div>
        {showPretax && <div className="seg-save" style={{ width: seg(retHsaAnnual) + '%', opacity:0.6 }}></div>}
        {showOther  && <div style={{ width: seg(otherDeductAnnual) + '%', height:'100%', background:'var(--muted)', opacity:0.35 }}></div>}
        <div className="seg-give"  style={{ width: seg(bucketAnnual.give)  + '%' }}></div>
        {showUnalloc && <div className="seg-left" style={{ width: seg(bucketAnnual.unalloc) + '%' }}></div>}
      </div>
      <div className="alloc-legend">
        <LegItem dot="needs" label="Needs"  amt={bucketAnnual.needs} p={bucketAnnual.needs/denom} avg={bucketMonthlyAvg.needs} />
        <LegItem dot="wants" label="Wants"  amt={bucketAnnual.wants} p={bucketAnnual.wants/denom} avg={bucketMonthlyAvg.wants} />
        <LegItem dot="save"  label="Saving" amt={saveWithNet}        p={saveWithNet /denom}       avg={saveAvg} />
        {showPretax && <LegItem dot="save" label="Pretax savings"           amt={retHsaAnnual}     p={retHsaAnnual/denom}     avg={retHsaAnnual/12} />}
        {showOther  && <LegItem dot="left" label="Other payroll deductions" amt={otherDeductAnnual} p={otherDeductAnnual/denom} avg={otherDeductAnnual/12} />}
        <LegItem dot="give"  label="Giving" amt={bucketAnnual.give}  p={bucketAnnual.give /denom} avg={bucketMonthlyAvg.give} />
        {showUnalloc && <LegItem dot="left" label="Unallocated" amt={bucketAnnual.unalloc} p={bucketAnnual.unalloc/denom} avg={bucketMonthlyAvg.unalloc} />}
      </div>
      <div className="alloc-rules">
        <Rule label="Housing"      sub={payrollActive ? 'rule of thumb: under 30% of gross' : 'rule of thumb: under 30% of income'} val={pct1(housingGroup ? housingGroup.annual : 0, denom)} ok={housingPct <= 0.30} />
        <Rule label="Savings rate" sub={payrollActive ? 'rule of thumb: 15% or more (of gross)' : 'rule of thumb: 15% or more'} val={pct1(savingsRateNum, denom)} ok={savingRate >= 0.15} />
        <Rule label="Giving"       val={pct1(bucketAnnual.give, denom)} ok={givingRate >= 0.10} />
      </div>
    </div>
  );
}

function LegItem({ dot, label, amt, p, avg }) {
  return (
    <div className="leg">
      <div className="row1"><span className={'dot ' + dot}></span>{label}</div>
      <div className="amt">{fmt(amt, { zero:'$0' })}</div>
      <div className="pct">{Math.round(p * 100)}% &middot; {fmt(avg, { zero:'$0' })}/mo</div>
    </div>
  );
}
function Rule({ label, sub, val, ok }) {
  return (
    <div className="rule">
      <div className="lhs"><span>{label}</span>{sub && <small>{sub}</small>}</div>
      <div className={'rhs ' + (ok ? 'ok' : 'warn')}>{val}</div>
    </div>
  );
}
function NumberInput({ value, onChange, dim }) {
  const [text, setText] = React.useState(value === 0 ? '' : String(value));
  React.useEffect(() => { setText(value === 0 ? '' : (Math.round(value * 100) / 100).toString()); }, [value]);
  return (
    <input value={text} placeholder="-" inputMode="decimal"
      onChange={e => { const t = e.target.value.replace(/[^\d.\-]/g, ''); setText(t); onChange(parseFloat(t) || 0); }}
      style={dim && (!value || value === 0) ? { color:'var(--muted)', opacity:0.6 } : undefined}
    />
  );
}
function Kpi({ label, value, tone, integer, suffix, pct: pctMode }) {
  let text;
  if (pctMode)      text = value + '%';
  else if (integer) text = String(value) + (suffix || '');
  else              text = fmt(value, { zero:'$0' });
  return (
    <div className="kpi">
      <div className="lbl">{label}</div>
      <div className="val">{text}</div>
      {tone && <div className={'delta ' + tone}>{tone === 'pos' ? 'positive savings' : 'over budget'}</div>}
    </div>
  );
}

/* Fix #1 / #6: per-row settings — fill mode, fund classification, payroll deductions */
function RowSettingsModal({ kind, row, netMonthlyAvg = 0, deductionCatMatches = [], onSave, onClose }) {
  const isIncome = kind === 'income';
  const [fillMode, setFillMode] = React.useState(row.fillMode === 'manual' ? 'manual' : 'across');
  const [isFund,   setIsFund]   = React.useState(!!row.isFund);
  const [flow,     setFlow]     = React.useState(row.flow || 'auto');   /* Fix 3.1 */

  const pd = row.payrollDeductions || {};
  const [r401k, setR401k] = React.useState(pd.retirement401k != null ? String(pd.retirement401k) : '');
  const [hsa,   setHsa]   = React.useState(pd.hsa            != null ? String(pd.hsa)            : '');
  const [prem,  setPrem]  = React.useState(pd.pretaxPremiums != null ? String(pd.pretaxPremiums) : '');
  const [other, setOther] = React.useState(pd.otherPretax    != null ? String(pd.otherPretax)    : '');
  const [gross, setGross] = React.useState(pd.grossMonthly   != null ? String(pd.grossMonthly)   : '');

  const num = (v) => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };
  const dedTotal   = num(r401k) + num(hsa) + num(prem) + num(other);
  const net        = netMonthlyAvg || 0;
  const grossGiven = gross.trim() !== '';
  const grossVal   = grossGiven ? num(gross) : (net + dedTotal);
  const implied    = grossGiven ? (grossVal - net - dedTotal) : 0;

  let error = '';
  if (num(r401k) < 0 || num(hsa) < 0 || num(prem) < 0 || num(other) < 0 || num(gross) < 0) error = 'Amounts cannot be negative.';
  else if (net > 0 && dedTotal > net * 2) error = 'Pretax deductions look too large versus take-home pay. Enter monthly amounts.';
  else if (grossGiven && implied < 0)     error = 'Gross pay is less than take-home plus deductions — check your numbers.';

  const handleSave = () => {
    if (error) return;
    if (isIncome) {
      /* Fix 5.1: double-count guard — a 401k/HSA deduction plus a same-named
         budget category would count the money twice. */
      if ((num(r401k) > 0 || num(hsa) > 0) && deductionCatMatches.length) {
        const list = deductionCatMatches
          .map(m => "'" + m.name + "' (" + fmt(m.monthlyAvg, { zero:'$0' }) + '/mo)').join(', ');
        const ok = confirm(
          'You also budget ' + list + ' as a spending category.\n\n' +
          'If that is the same money as this payroll deduction, it will be counted twice. ' +
          'Recommended: keep the payroll deduction here and delete that budget category.\n\n' +
          'OK = save the deduction anyway   ·   Cancel = go back');
        if (!ok) return;
      }
      const payrollDeductions = {
        retirement401k: num(r401k), hsa: num(hsa),
        pretaxPremiums: num(prem),  otherPretax: num(other),
      };
      if (grossGiven) payrollDeductions.grossMonthly = num(gross);
      onSave({ fillMode, payrollDeductions });
    } else {
      onSave({ fillMode, isFund, flow });
    }
    onClose();
  };

  const dedField = (label, value, setter) => (
    <div className="form-field" style={{ marginBottom:10 }}>
      <label style={{ marginBottom:4 }}>{label} <span style={{ color:'var(--muted)', textTransform:'none', letterSpacing:0 }}>/ month</span></label>
      <input type="number" inputMode="decimal" min="0" step="10" className="form-input" placeholder="0" value={value} onChange={e => setter(e.target.value)} />
    </div>
  );
  const reconRow = (label, val, opts) => (
    <div style={{ display:'flex', justifyContent:'space-between', fontSize:12.5, padding:'3px 0', color:(opts && opts.muted) ? 'var(--muted)' : 'var(--ink-soft)', ...(opts && opts.strong ? { fontWeight:600, color:'var(--ink)', borderTop:'1px solid var(--line)', marginTop:4, paddingTop:6 } : {}) }}>
      <span>{label}</span><span style={{ fontFamily:'var(--mono)' }}>{val}</span>
    </div>
  );

  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" style={{ width: isIncome ? 440 : 380 }} onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) handleSave(); }}>
        <div className="modal-head">
          <h2>{isIncome ? 'Income settings' : 'Category settings'}</h2>
          <button className="modal-close" aria-label="Close" onClick={onClose}>&#215;</button>
        </div>
        <div style={{ fontSize:13, color:'var(--muted)', margin:'-4px 0 14px' }}>{row.name || (isIncome ? 'Income source' : 'Category')}</div>

        <div className="form-field">
          <label>Fill behavior</label>
          <div style={{ display:'flex', flexDirection:'column', gap:8, marginTop:4 }}>
            <label style={{ display:'flex', alignItems:'flex-start', gap:8, cursor:'pointer', fontWeight:400, textTransform:'none', letterSpacing:0 }}>
              <input type="radio" name="fillMode" checked={fillMode === 'across'} onChange={() => setFillMode('across')} style={{ marginTop:2 }} />
              <span><strong>Fill across</strong> — "Fill across from Jan" copies January to every month.</span>
            </label>
            <label style={{ display:'flex', alignItems:'flex-start', gap:8, cursor:'pointer', fontWeight:400, textTransform:'none', letterSpacing:0 }}>
              <input type="radio" name="fillMode" checked={fillMode === 'manual'} onChange={() => setFillMode('manual')} style={{ marginTop:2 }} />
              <span><strong>Fill manually</strong> — leave this row alone (e.g. a one-time bonus).</span>
            </label>
          </div>
        </div>

        {!isIncome && (
          <div className="form-field">
            <label>Classification</label>
            <label style={{ display:'flex', alignItems:'flex-start', gap:8, cursor:'pointer', fontWeight:400, textTransform:'none', letterSpacing:0, marginTop:4 }}>
              <input type="checkbox" checked={isFund} onChange={e => setIsFund(e.target.checked)} style={{ marginTop:2 }} />
              <span><strong>Fund</strong> — accrues its monthly budget and draws down as you log expenses on the Track tab. The Track card shows accrued budget to date less actual spending.</span>
            </label>

            <label style={{ marginTop:16 }}>Counts as</label>
            <select className="form-input" value={flow} onChange={e => setFlow(e.target.value)}>
              <option value="auto">Auto — decide from the category name</option>
              <option value="cash">Cash savings — feeds Beginning Cash</option>
              <option value="lt">Long-term investing — feeds Beginning Long-term</option>
              <option value="debt">Debt payment — reduces Beginning Debt</option>
            </select>
            <p style={{ fontSize:12, color:'var(--muted)', margin:'6px 0 0', textTransform:'none', letterSpacing:0 }}>
              Overrides the name guess. Use this so "Roth IRA" or "Brokerage" route to long-term, and "Student loan" or "Car payment" count as debt.
            </p>
          </div>
        )}

        {isIncome && (
          <div className="form-field">
            <label>Pretax payroll deductions</label>
            <p style={{ fontSize:12, color:'var(--muted)', margin:'2px 0 12px', textTransform:'none', letterSpacing:0 }}>
              Money withheld before your take-home pay. Leaving these at zero keeps every calculation exactly as before. Enter each amount here <em>only if it is not already a budget category</em> — otherwise it will be counted twice.
            </p>
            {dedField('401(k) / 403(b)', r401k, setR401k)}
            {dedField('HSA', hsa, setHsa)}
            {dedField('Pretax premiums', prem, setPrem)}
            {dedField('Other pretax', other, setOther)}
            <div className="form-field" style={{ marginBottom:6 }}>
              <label style={{ marginBottom:4 }}>Gross pay <span style={{ color:'var(--muted)', textTransform:'none', letterSpacing:0 }}>/ month (optional)</span></label>
              <input type="number" inputMode="decimal" min="0" step="50" className="form-input" placeholder="optional — reveals implied taxes" value={gross} onChange={e => setGross(e.target.value)} />
            </div>
            <div style={{ background:'var(--bg-soft)', border:'1px solid var(--line-soft)', borderRadius:'var(--r-md)', padding:'10px 14px', marginTop:6 }}>
              {reconRow('Take-home (avg / mo)', fmtAccurate(net), { muted:true })}
              {reconRow('+ 401(k) / 403(b)', fmtAccurate(num(r401k)), { muted:true })}
              {reconRow('+ HSA', fmtAccurate(num(hsa)), { muted:true })}
              {reconRow('+ Pretax premiums', fmtAccurate(num(prem)), { muted:true })}
              {reconRow('+ Other pretax', fmtAccurate(num(other)), { muted:true })}
              {grossGiven && reconRow('+ Implied taxes / withholding', fmtAccurate(implied), { muted:true })}
              {reconRow(grossGiven ? 'Gross pay (entered)' : 'Gross pay (implied)', fmtAccurate(grossVal), { strong:true })}
            </div>
          </div>
        )}

        {error && <div className="form-error">{error}</div>}
        <div className="modal-actions">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn primary" onClick={handleSave} disabled={!!error} style={error ? { opacity:0.5, cursor:'not-allowed' } : undefined}>Save</button>
        </div>
      </div>
    </div>
  );
}

function DebtRateModal({ currentRate, onSave, onClose }) {
  const [rate, setRate] = React.useState(String(currentRate));
  const handleSave = () => {
    const r = parseFloat(rate);
    if (!isNaN(r) && r >= 0 && r <= 100) onSave(r);
    onClose();
  };
  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" style={{ width:340 }} onKeyDown={e => { if (e.key === 'Enter') handleSave(); }}>
        <div className="modal-head">
          <h2>Debt interest rate</h2>
          <button className="modal-close" aria-label="Close" onClick={onClose}>&#215;</button>
        </div>
        <div className="form-field">
          <label>Annual interest rate (%)</label>
          <input type="number" inputMode="decimal" className="form-input" value={rate}
            onChange={e => setRate(e.target.value)}
            min="0" max="100" step="0.25" autoFocus placeholder="e.g. 6.5" />
        </div>
        <p style={{ fontSize:12.5, color:'var(--muted)', margin:'-4px 0 16px' }}>
          Used to accrue monthly interest on your Beginning Debt balance. Categories named with "debt" or "interest" automatically reduce the balance each month.
        </p>
        <div className="modal-actions">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn primary" onClick={handleSave}>Save</button>
        </div>
      </div>
    </div>
  );
}
  </script>

  <script type="text/babel">
/* ---- TrackScreen ---- */
function TrackScreen({ data, setData, monthIdx, setMonthIdx, autoLog, onAutoLogHandled }) {
  const [showModal,        setShowModal]        = React.useState(false);
  const [showTransactions, setShowTransactions] = React.useState(false);
  const [defaultCatId,     setDefaultCatId]     = React.useState(null);

  /* Fix #3: open the Log-expense modal when the mobile FAB routes here */
  React.useEffect(() => {
    if (autoLog) { setShowModal(true); if (onAutoLogHandled) onAutoLogHandled(); }
  }, [autoLog]);

  const monthTxs = data.transactions.filter(t => {
    const d = new Date(t.date + 'T00:00:00');
    return d.getFullYear() === data.year && d.getMonth() === monthIdx;
  });

  const actualByCat = {};
  monthTxs.forEach(t => { actualByCat[t.categoryId] = (actualByCat[t.categoryId] || 0) + t.amount; });

  /* Fix #1 (Fund): cumulative actuals from January through the selected month, this year */
  const cumActualByCat = {};
  data.transactions.forEach(t => {
    const d = new Date(t.date + 'T00:00:00');
    if (d.getFullYear() === data.year && d.getMonth() <= monthIdx) {
      cumActualByCat[t.categoryId] = (cumActualByCat[t.categoryId] || 0) + t.amount;
    }
  });

  const cats = [];
  data.groups.forEach(g => g.cats.forEach(c => {
    const budgeted = c.monthly[monthIdx] || 0;
    const actual   = actualByCat[c.id]   || 0;
    /* Fund: accrue Jan→selected month of budget, minus cumulative spending to date */
    const accrued     = c.isFund ? sum(c.monthly.slice(0, monthIdx + 1)) : 0;
    const spentToDate = c.isFund ? (cumActualByCat[c.id] || 0) : 0;
    const fundBalance = accrued - spentToDate;
    if (budgeted > 0 || actual > 0 || (c.isFund && (accrued > 0 || spentToDate > 0))) {
      cats.push({ ...c, groupId:g.id, groupName:g.name, budgeted, actual, accrued, spentToDate, fundBalance });
    }
  }));

  const totBud = sum(cats.map(c => c.budgeted));
  const totAct = sum(cats.map(c => c.actual));
  const incomeBud = sum(data.income.map(r => r.monthly[monthIdx]));
  const remaining = totBud - totAct;

  /* Budget spent percentage */
  const spentPct = totBud > 0 ? Math.round((totAct / totBud) * 100) : 0;

  const today = new Date();
  const isCurrentMonth = today.getFullYear() === data.year && today.getMonth() === monthIdx;
  const daysInMonth    = new Date(data.year, monthIdx + 1, 0).getDate();
  const dayOfMonth     = isCurrentMonth ? today.getDate() : daysInMonth;
  const monthPct       = Math.round((dayOfMonth / daysInMonth) * 100);

  const buckets = { needs:{b:0,a:0}, wants:{b:0,a:0}, save:{b:0,a:0}, give:{b:0,a:0} };
  cats.forEach(c => { if (buckets[c.bucket]) { buckets[c.bucket].b += c.budgeted; buckets[c.bucket].a += c.actual; } });

  /* Fix 3.2: an expense dated in another month/year would silently vanish from
     the current view. Follow it: switch to its month, or warn if it's another year. */
  const addTransaction    = tx => {
    setData(d => ({ ...d, transactions: [...d.transactions, { id:uid(), ...tx }] }));
    const td = new Date(tx.date + 'T00:00:00');
    const txMonth = td.getMonth(), txYear = td.getFullYear();
    if (txYear !== data.year) {
      alert('This expense is dated ' + txYear + " — it won't appear in your " + data.year +
            ' views. Change the year at the top of the app to see it.');
    } else if (txMonth !== monthIdx) {
      setMonthIdx(txMonth);
    }
  };
  const deleteTransaction = id => setData(d => ({ ...d, transactions: d.transactions.filter(t => t.id !== id) }));

  const openModalForCat = (catId) => { setDefaultCatId(catId); setShowModal(true); };
  const handleModalClose = () => { setShowModal(false); setDefaultCatId(null); };

  return (
    <div>
      <div className="page-head">
        <div>
          <h1>{MONTHS_LONG[monthIdx]}, <em>so far</em></h1>
          <div className="sub">
            {isCurrentMonth
              ? 'Day ' + dayOfMonth + ' of ' + daysInMonth + ' — ' + monthPct + '% through the month.'
              : 'Viewing ' + MONTHS_LONG[monthIdx] + ' ' + data.year + '.'}
            {' '}Click any category card to log an expense for it.
          </div>
        </div>
        <div className="actions">
          <button className="btn ghost" onClick={() => setMonthIdx((monthIdx + 11) % 12)}>‹ {MONTHS_LONG[(monthIdx + 11) % 12]}</button>
          <button className="btn ghost" onClick={() => setMonthIdx((monthIdx + 1) % 12)}>{MONTHS_LONG[(monthIdx + 1) % 12]} ›</button>
          <button className="btn ghost" onClick={() => setShowTransactions(v => !v)}>{showTransactions ? 'Card view' : 'Transactions'}</button>
          <button className="btn primary" onClick={() => setShowModal(true)}>Log expense</button>
        </div>
      </div>

      <div className="kpis">
        <Kpi label="Income budgeted" value={incomeBud} />
        <Kpi label="Spent so far"    value={totAct} />
        <Kpi label="Left in budget"  value={remaining} tone={remaining < 0 ? 'neg' : (totAct > 0 ? 'pos' : undefined)} />
        <Kpi label="Budget used"     value={spentPct} pct />
      </div>

      {showTransactions ? (
        <TransactionList transactions={monthTxs} data={data} onDelete={deleteTransaction} onAdd={() => setShowModal(true)} />
      ) : (
        <div className="track-grid">
          <div>
            {cats.length === 0 ? (
              <div className="tx-empty">No budget categories set for this month.</div>
            ) : (
              BUCKET_ORDER.map(b => {
                const bcats = cats.filter(c => c.bucket === b);
                if (!bcats.length) return null;
                const bs = buckets[b], bp = bs.b > 0 ? Math.round((bs.a / bs.b) * 100) : 0;
                return (
                  <div key={b} style={{ marginTop:18 }}>
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', padding:'4px 4px 8px' }}>
                      <div style={{ display:'flex', alignItems:'center', gap:10, fontSize:11.5, textTransform:'uppercase', letterSpacing:'0.12em', color:'var(--ink-soft)' }}>
                        <span className={'bucket-dot ' + b} style={{ margin:0 }}></span>{BUCKETS[b].label}
                      </div>
                      <div style={{ fontSize:12.5, color:'var(--muted)', fontFamily:'var(--mono)' }}>
                        <span style={{ color:'var(--ink)' }}>{fmt(bs.a, { zero:'$0' })}</span> of {fmt(bs.b, { zero:'$0' })} &middot; {bp}%
                      </div>
                    </div>
                    <div className="cat-grid">
                      {bcats.map(c => <CategoryCard key={c.id} cat={c} dayOfMonth={dayOfMonth} daysInMonth={daysInMonth} onClick={() => openModalForCat(c.id)} />)}
                    </div>
                  </div>
                );
              })
            )}
          </div>
          <div className="month-summary">
            <h3>{MONTHS_LONG[monthIdx]} at a glance</h3>
            <div className="summary-row"><span className="l">Income (budgeted)</span><span className="r">{fmt(incomeBud)}</span></div>
            {BUCKET_ORDER.map(b => (
              <div className="summary-row" key={b}>
                <span className="l"><span className="dot" style={{ background:BUCKETS[b].color }}></span>{BUCKETS[b].label}</span>
                <span className="r">{fmt(buckets[b].a, { zero:'$0' })}<small> of {fmt(buckets[b].b, { zero:'$0' })}</small></span>
              </div>
            ))}
            <div className="summary-row" style={{ borderTop:'1px solid var(--line)', marginTop:4 }}>
              <span className="l">Remaining Budget</span>
              <span className="r" style={{ color: remaining < 0 ? 'var(--warn)' : 'var(--save)' }}>{fmt(remaining, { sign:true, zero:'$0' })}</span>
            </div>
            <div style={{ marginTop:16 }}>
              <button className="btn" style={{ width:'100%', justifyContent:'center' }} onClick={() => setShowModal(true)}>+ Log expense</button>
            </div>
          </div>
        </div>
      )}

      <div className="foot-note">
        <span>{monthTxs.length} transaction{monthTxs.length !== 1 ? 's' : ''} logged this month.</span>
        <span>Click any category card to log an expense for it directly.</span>
      </div>

      {showModal && (
        <LogExpenseModal data={data} monthIdx={monthIdx} year={data.year}
          defaultCategoryId={defaultCatId} onSave={addTransaction} onClose={handleModalClose} />
      )}
    </div>
  );
}

function TransactionList({ transactions, data, onDelete, onAdd }) {
  const catMap = {};
  data.groups.forEach(g => g.cats.forEach(c => { catMap[c.id] = { name:c.name, bucket:c.bucket, group:g.name }; }));
  const sorted = [...transactions].sort((a, b) => b.date.localeCompare(a.date));
  if (!sorted.length) {
    return (
      <div className="tx-empty">
        No expenses logged this month yet.{' '}
        <button className="btn primary" style={{ display:'inline-block', marginLeft:10 }} onClick={onAdd}>Log first expense</button>
      </div>
    );
  }
  return (
    <div className="sheet-wrap tx-table">
      <div className="tx-head"><span>Date</span><span>Note</span><span>Category</span><span style={{ textAlign:'right' }}>Amount</span><span></span></div>
      {sorted.map(tx => {
        const cat = catMap[tx.categoryId];
        return (
          <div key={tx.id} className="tx-row">
            <span style={{ color:'var(--muted)', fontFamily:'var(--mono)', fontSize:12 }}>{tx.date}</span>
            <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', color: tx.note ? 'var(--ink)' : 'var(--muted)' }}>{tx.note || '—'}</span>
            <span style={{ display:'flex', alignItems:'center', gap:8, overflow:'hidden' }}>
              {cat && <span className={'bucket-dot ' + cat.bucket} style={{ flexShrink:0, margin:0 }}></span>}
              <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', fontSize:12.5 }}>
                {cat ? cat.name : <span style={{ color:'var(--muted)' }}>Unknown</span>}
                {cat && <span style={{ color:'var(--muted)', fontSize:11, marginLeft:6 }}>{cat.group}</span>}
              </span>
            </span>
            <span style={{ textAlign:'right', fontFamily:'var(--mono)', fontVariantNumeric:'tabular-nums' }}>{fmt(tx.amount, { zero:'$0' })}</span>
            <button onClick={() => { if (confirm('Delete this transaction?')) onDelete(tx.id); }}
              style={{ color:'var(--muted)', fontSize:16, lineHeight:1, cursor:'pointer' }}
              onMouseEnter={e => e.currentTarget.style.color='var(--warn)'}
              onMouseLeave={e => e.currentTarget.style.color='var(--muted)'}>&#215;</button>
          </div>
        );
      })}
    </div>
  );
}

function CategoryCombobox({ data, value, onChange }) {
  const [query, setQuery] = React.useState('');
  const [open,  setOpen]  = React.useState(false);
  const inputRef          = React.useRef(null);

  const allCats = React.useMemo(() => {
    const list = [];
    data.groups.forEach(g => g.cats.forEach(c => list.push({ id:c.id, name:c.name, group:g.name, bucket:c.bucket })));
    return list;
  }, [data.groups]);

  const selectedCat = allCats.find(c => c.id === value);

  const filtered = React.useMemo(() => {
    if (!query.trim()) return allCats;
    const q = query.toLowerCase();
    return allCats.filter(c => c.name.toLowerCase().includes(q) || c.group.toLowerCase().includes(q));
  }, [allCats, query]);

  const handleFocus = () => { setQuery(''); setOpen(true); };
  const handleBlur  = () => { setTimeout(() => setOpen(false), 160); };
  const selectCat   = (cat) => { onChange(cat.id); setQuery(''); setOpen(false); if (inputRef.current) inputRef.current.blur(); };

  const renderItems = () => {
    if (query.trim()) {
      if (!filtered.length) return <div style={{ padding:'10px 12px', color:'var(--muted)', fontSize:13 }}>No categories match</div>;
      return filtered.map(c => (
        <div key={c.id} onMouseDown={() => selectCat(c)}
          style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 12px', cursor:'pointer', background: c.id === value ? 'var(--bg-soft)' : 'transparent', fontSize:13.5 }}
          onMouseEnter={e => { e.currentTarget.style.background='var(--bg)'; }}
          onMouseLeave={e => { e.currentTarget.style.background = c.id === value ? 'var(--bg-soft)' : 'transparent'; }}>
          <span className={'bucket-dot ' + c.bucket} style={{ margin:0, flexShrink:0 }}></span>
          <span style={{ flex:1 }}>{c.name}</span>
          <span style={{ color:'var(--muted)', fontSize:11.5 }}>{c.group}</span>
        </div>
      ));
    }
    return data.groups.map(g => (
      <React.Fragment key={g.id}>
        <div style={{ padding:'6px 12px 3px', fontSize:10.5, textTransform:'uppercase', letterSpacing:'0.12em', color:'var(--muted)', background:'var(--bg-soft)', borderTop:'1px solid var(--line-soft)' }}>{g.name}</div>
        {g.cats.map(c => (
          <div key={c.id} onMouseDown={() => selectCat(c)}
            style={{ display:'flex', alignItems:'center', gap:8, padding:'7px 12px 7px 18px', cursor:'pointer', background: c.id === value ? 'var(--bg-soft)' : 'transparent', fontSize:13.5 }}
            onMouseEnter={e => { e.currentTarget.style.background='var(--bg)'; }}
            onMouseLeave={e => { e.currentTarget.style.background = c.id === value ? 'var(--bg-soft)' : 'transparent'; }}>
            <span className={'bucket-dot ' + c.bucket} style={{ margin:0, flexShrink:0 }}></span>
            <span>{c.name}</span>
          </div>
        ))}
      </React.Fragment>
    ));
  };

  return (
    <div style={{ position:'relative' }}>
      <input ref={inputRef} type="text" className="form-input"
        value={open ? query : (selectedCat ? selectedCat.name : '')}
        placeholder="Type to search or scroll to select…"
        onChange={e => { setQuery(e.target.value); setOpen(true); }}
        onFocus={handleFocus} onBlur={handleBlur} />
      {open && (
        <div style={{ position:'absolute', top:'calc(100% + 4px)', left:0, right:0, background:'var(--surface)', border:'1px solid var(--line)', borderRadius:'var(--r-md)', boxShadow:'0 8px 28px rgba(0,0,0,0.13)', maxHeight:240, overflowY:'auto', zIndex:200 }}>
          {renderItems()}
        </div>
      )}
    </div>
  );
}

function LogExpenseModal({ data, monthIdx, year, defaultCategoryId, onSave, onClose }) {
  const today = new Date();
  const defaultDate = (today.getFullYear() === year && today.getMonth() === monthIdx)
    ? today.toISOString().slice(0, 10)
    : year + '-' + String(monthIdx + 1).padStart(2, '0') + '-01';

  const [date,       setDate]       = React.useState(defaultDate);
  const [amount,     setAmount]     = React.useState('');
  const [note,       setNote]       = React.useState('');
  const [categoryId, setCategoryId] = React.useState('');
  const [groupId,    setGroupId]    = React.useState('');
  const [err,        setErr]        = React.useState('');

  React.useEffect(() => {
    const catId = defaultCategoryId;
    if (catId) {
      setCategoryId(catId);
      for (const g of data.groups) { if (g.cats.find(c => c.id === catId)) { setGroupId(g.id); break; } }
    } else if (data.groups.length > 0 && data.groups[0].cats.length > 0) {
      setCategoryId(data.groups[0].cats[0].id);
      setGroupId(data.groups[0].id);
    }
  }, []);

  const handleCatChange = (id) => {
    setCategoryId(id);
    for (const g of data.groups) { if (g.cats.find(c => c.id === id)) { setGroupId(g.id); break; } }
  };

  const handleSave = () => {
    const amt = parseFloat(amount);
    if (!amount || isNaN(amt) || amt <= 0) { setErr('Enter a valid amount greater than zero.'); return; }
    if (!categoryId) { setErr('Select a category.'); return; }
    if (!date)       { setErr('Select a date.'); return; }
    onSave({ date, categoryId, groupId, amount: Math.round(amt * 100) / 100, note: note.trim() });
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) handleSave(); }}>
        <div className="modal-head">
          <h2>Log expense</h2>
          <button className="modal-close" aria-label="Close" onClick={onClose}>&#215;</button>
        </div>
        <div className="form-field">
          <label>Amount</label>
          <input type="number" inputMode="decimal" min="0.01" step="0.01" className="form-input"
            placeholder="0.00" value={amount} onChange={e => setAmount(e.target.value)} autoFocus />
        </div>
        <div className="form-field">
          <label>Category</label>
          <CategoryCombobox data={data} value={categoryId} onChange={handleCatChange} />
        </div>
        <div className="form-field">
          <label>Note <span style={{ color:'var(--muted)', textTransform:'none', letterSpacing:0 }}>(optional)</span></label>
          <input type="text" className="form-input" placeholder="e.g. Whole Foods run" value={note} onChange={e => setNote(e.target.value)} />
        </div>
        <div className="form-field">
          <label>Date</label>
          <input type="date" className="form-input" value={date} onChange={e => setDate(e.target.value)} />
        </div>
        {err && <div className="form-error">{err}</div>}
        <div className="modal-actions">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn primary" onClick={handleSave}>Save expense</button>
        </div>
      </div>
    </div>
  );
}

function CategoryCard({ cat, dayOfMonth, daysInMonth, onClick }) {
  const barColor  = BUCKETS[cat.bucket] ? BUCKETS[cat.bucket].color : 'var(--muted)';

  /* Fund cards show accrued budget-to-date less cumulative spending (a running balance). */
  if (cat.isFund) {
    const accrued = cat.accrued || 0, spent = cat.spentToDate || 0, bal = accrued - spent;
    const fp      = accrued > 0 ? Math.min(100, Math.round((spent / accrued) * 100)) : (spent > 0 ? 100 : 0);
    const over    = spent > accrued && accrued > 0;
    return (
      <div className={'cat-card fund' + (over ? ' over' : '')} onClick={onClick}
        style={{ cursor:'pointer', transition:'box-shadow 0.15s' }}
        onMouseEnter={e => { e.currentTarget.style.boxShadow='0 2px 10px rgba(0,0,0,0.09)'; }}
        onMouseLeave={e => { e.currentTarget.style.boxShadow=''; }}>
        <div className="cat-head">
          <div className="name-c"><span className="dot" style={{ background:barColor }}></span>{cat.name}<span className="fund-badge" style={{ cursor:'help' }} title="Fund: accrues its monthly budget and draws down as you log expenses — the amount shown is what remains available, not a monthly reset.">Fund</span></div>
          <div className="amounts"><span style={{ color: bal < 0 ? 'var(--warn)' : 'var(--ink)' }}>{fmt(bal, { zero:'$0' })}</span><span className="of"> avail</span></div>
        </div>
        <div className="bar">
          <div style={{ width: fp + '%', background: barColor }}></div>
        </div>
        <div className="meta">
          <span className="left">accrued {fmt(accrued, { zero:'$0' })} &middot; spent {fmt(spent, { zero:'$0' })}</span>
          <span>{fmt(cat.actual, { zero:'$0' })}/{fmt(cat.budgeted, { zero:'$0' })} mo</span>
        </div>
      </div>
    );
  }

  const p         = cat.budgeted > 0 ? Math.min(100, Math.round((cat.actual / cat.budgeted) * 100)) : (cat.actual > 0 ? 100 : 0);
  const over      = cat.actual > cat.budgeted && cat.budgeted > 0;
  const unstarted = cat.actual === 0;
  const expPct    = Math.round((dayOfMonth / daysInMonth) * 100);
  const remaining = cat.budgeted - cat.actual;
  return (
    <div className={'cat-card' + (over ? ' over' : '') + (unstarted ? ' unstarted' : '')}
      onClick={onClick}
      style={{ cursor:'pointer', transition:'box-shadow 0.15s' }}
      onMouseEnter={e => { e.currentTarget.style.boxShadow='0 2px 10px rgba(0,0,0,0.09)'; }}
      onMouseLeave={e => { e.currentTarget.style.boxShadow=''; }}>
      <div className="cat-head">
        <div className="name-c"><span className="dot" style={{ background:barColor }}></span>{cat.name}</div>
        <div className="amounts"><span>{fmt(cat.actual, { zero:'$0' })}</span><span className="of"> / {fmt(cat.budgeted, { zero:'$0' })}</span></div>
      </div>
      <div className="bar">
        <div style={{ width: p + '%', background: barColor }}></div>
        {cat.budgeted > 0 && <div style={{ position:'absolute', left: expPct + '%', top:-3, bottom:-3, width:1, background:'var(--ink-soft)', opacity:0.35 }}></div>}
      </div>
      <div className="meta">
        <span className="left">{unstarted ? 'click to log' : over ? fmt(-remaining) + ' over' : fmt(remaining) + ' left'}</span>
        <span>{p}%</span>
      </div>
    </div>
  );
}
  </script>

  <script type="text/babel">
/* ---- PlanScreen ---- */
function PlanScreen({ data, setData }) {
  const cashContribDefault = React.useMemo(() => {
    let s = 0;
    data.groups.forEach(g => g.cats.forEach(c => { if (c.bucket === 'save' && !catIsLtSavings(c) && !catIsDebtPayment(c)) s += sum(c.monthly); }));
    return Math.round(s / 12);
  }, [data.groups]);

  const ltContribDefault = React.useMemo(() => {
    let s = 0;
    data.groups.forEach(g => g.cats.forEach(c => { if (c.bucket === 'save' && catIsLtSavings(c) && !catIsDebtPayment(c)) s += sum(c.monthly); }));
    /* Fix #6: pretax 401k + HSA (monthly) also flow into long-term investments */
    data.income.forEach(r => { const p = r.payrollDeductions || {}; s += ((+p.retirement401k||0) + (+p.hsa||0)) * 12; });
    return Math.round(s / 12);
  }, [data.groups, data.income]);

  /* Default debt payment from budget categories with "debt" or "interest" in name */
  const debtPaymentDefault = React.useMemo(() => {
    let s = 0;
    data.groups.forEach(g => g.cats.forEach(c => { if (catIsDebtPayment(c)) s += sum(c.monthly); }));
    return Math.round(s / 12);
  }, [data.groups]);

  const incomeTotalMonthly = React.useMemo(() => Math.round(sum(data.income.map(r => sum(r.monthly))) / 12), [data.income]);

  /* Fix #5: seed from a saved projection if one exists, else fall back to budget-derived defaults */
  const pp = data.planProjection || null;
  const seed = (key, fallback) => (pp && pp[key] != null ? pp[key] : fallback);
  const [cashContrib,        setCashContrib]        = React.useState(() => seed('cashContrib', cashContribDefault));
  const [ltContrib,          setLtContrib]          = React.useState(() => seed('ltContrib', ltContribDefault > 0 ? ltContribDefault : 600));
  const [debtPaymentMonthly, setDebtPaymentMonthly] = React.useState(() => seed('debtPaymentMonthly', debtPaymentDefault));
  const [cashYield,          setCashYield]          = React.useState(() => seed('cashYield', data.planCashYield != null ? data.planCashYield : 4));
  const [ltYield,            setLtYield]            = React.useState(() => seed('ltYield', data.planLtYield != null ? data.planLtYield : 7));
  const [years,              setYears]              = React.useState(() => seed('years', 10));
  const [startCash,          setStartCash]          = React.useState(() => seed('startCash', data.beginningCash     != null ? data.beginningCash     : 0));
  const [startLT,            setStartLT]            = React.useState(() => seed('startLT', data.beginningLongTerm != null ? data.beginningLongTerm : 0));
  const [startDebt,          setStartDebt]          = React.useState(() => seed('startDebt', data.beginningDebt     != null ? data.beginningDebt     : 0));
  const [savedProj,          setSavedProj]          = React.useState(false);

  const debtInterestRate = data.debtInterestRate || 0;

  const updateCashYield = (v) => { setCashYield(v); setData(d => ({ ...d, planCashYield: v })); };
  const updateLtYield   = (v) => { setLtYield(v);   setData(d => ({ ...d, planLtYield:   v })); };

  const [customMilestones,   setCustomMilestones]   = React.useState(data.customMilestones || []);
  const [showMilestoneModal, setShowMilestoneModal] = React.useState(false);

  React.useEffect(() => { setData(d => ({ ...d, customMilestones })); }, [customMilestones]);

  const months = years * 12;

  const seriesTotal = React.useMemo(() => {
    const out = [];
    let cash = startCash, lt = startLT, debt = startDebt;
    const rC = cashYield / 100 / 12, rL = ltYield / 100 / 12;
    const rD = debtInterestRate / 100 / 12;
    for (let m = 0; m <= months; m++) {
      out.push({ m, bal: cash + lt - debt, cash, lt, debt });
      cash = cash * (1 + rC) + cashContrib;
      lt   = lt   * (1 + rL) + ltContrib;
      debt = Math.max(0, debt * (1 + rD) - debtPaymentMonthly);
    }
    return out;
  }, [months, cashYield, ltYield, startCash, startLT, cashContrib, ltContrib, startDebt, debtPaymentMonthly, debtInterestRate]);

  const last = seriesTotal[seriesTotal.length - 1];
  const finalBal = last.bal, finalCash = last.cash, finalLT = last.lt, finalDebt = last.debt;
  const grossInvested = (startCash + startLT) + (cashContrib + ltContrib) * months;
  const earned        = (finalCash + finalLT) - grossInvested;

  function monthsToReachTotal(target) {
    if ((startCash + startLT) >= target) return 0;
    let cash = startCash, lt = startLT;
    const rC = cashYield / 100 / 12, rL = ltYield / 100 / 12;
    for (let m = 1; m <= 12 * 60; m++) {
      cash = cash * (1 + rC) + cashContrib;
      lt   = lt   * (1 + rL) + ltContrib;
      if ((cash + lt) >= target) return m;
    }
    return null;
  }

  function monthsToReachAccount(target, startBal, monthly, rate) {
    if (startBal >= target) return 0;
    if (monthly <= 0 && rate <= 0) return null;
    let bal = startBal;
    for (let m = 1; m <= 12 * 60; m++) { bal = bal * (1 + rate) + monthly; if (bal >= target) return m; }
    return null;
  }

  function monthsToBeDebtFree(startD, annualRate, payment) {
    if (startD <= 0) return 0;
    if (payment <= 0) return null;
    const r = annualRate / 100 / 12;
    let d = startD;
    for (let m = 1; m <= 12 * 80; m++) {
      d = d * (1 + r) - payment;
      if (d <= 0) return m;
    }
    return null;
  }

  let monthlyNeedsWants = 0;
  data.groups.forEach(g => g.cats.forEach(c => { if (c.bucket === 'needs' || c.bucket === 'wants') monthlyNeedsWants += sum(c.monthly) / 12; }));
  if (monthlyNeedsWants === 0) monthlyNeedsWants = 3000;

  /* Sabbatical replaced by Debt Free (computed separately below) */
  const presetMilestones = [
    { name: 'Emergency fund',         detail: '3 months of essentials',   target: monthlyNeedsWants * 3 },
    { name: 'House down payment',     detail: '20% on a $450k home',      target: 90000 },
    { name: 'Financial independence', detail: '25\xD7 annual essentials', target: monthlyNeedsWants * 12 * 25 },
  ];

  const resetToBudget = () => {
    setStartCash(data.beginningCash  || 0);
    setStartLT(data.beginningLongTerm || 0);
    setStartDebt(data.beginningDebt  || 0);
    setCashContrib(cashContribDefault);
    setLtContrib(ltContribDefault > 0 ? ltContribDefault : 600);
    setDebtPaymentMonthly(debtPaymentDefault);
    setCashYield(data.planCashYield || 4);
    setLtYield(data.planLtYield     || 7);
    setYears(10);
    /* Fix #5: clear any saved projection so the tab reverts to budget defaults on reload */
    setData(d => ({ ...d, planProjection: null }));
    setSavedProj(false);
  };

  /* Fix #5: persist the current slider inputs so they survive navigation / closing the app */
  const saveProjection = () => {
    setData(d => ({
      ...d,
      planProjection: { cashContrib, ltContrib, debtPaymentMonthly, cashYield, ltYield, years, startCash, startLT, startDebt },
      planCashYield: cashYield, planLtYield: ltYield,
    }));
    setSavedProj(true);
    setTimeout(() => setSavedProj(false), 2000);
  };

  return (
    <div>
      <div className="page-head">
        <div>
          <h1>Plan for what&#8217;s <em>next</em></h1>
          <div className="sub">See how your cash and long-term savings compound over time.</div>
        </div>
        <div className="actions">
          <button className="btn" onClick={resetToBudget}>Reset to budget</button>
          <button className="btn primary" onClick={saveProjection}>{savedProj ? 'Saved ✓' : 'Save projection'}</button>
        </div>
      </div>

      <div className="kpis">
        <Kpi label="Cash / month"        value={cashContrib} />
        <Kpi label="Long-term / month"   value={ltContrib} />
        <Kpi label="Projected net worth" value={Math.round(finalBal)} />
        <Kpi label="Growth from returns" value={Math.round(earned)} />
      </div>

      <div className="plan-grid">
        <div className="chart-card">
          <h3>Projected balance</h3>
          <div className="caption">
            Cash: {fmt(cashContrib, { zero:'$0' })}/mo @ {cashYield}%
            {' · '}Long-term: {fmt(ltContrib, { zero:'$0' })}/mo @ {ltYield}%
            {startDebt > 0 ? ' · Debt: ' + fmt(Math.round(startDebt), { zero:'$0' }) + ' @ ' + debtInterestRate.toFixed(1) + '%' : ''}
            {' · '}starting from {fmt(Math.round(startCash + startLT), { zero:'$0' })}.
          </div>
          <ProjectionChart series={seriesTotal} years={years} />
          <div style={{ display:'flex', gap:24, marginTop:14, fontSize:12, color:'var(--muted)', flexWrap:'wrap' }}>
            <span>Cash at yr {years}: <strong style={{ color:'var(--ink)', fontFamily:'var(--mono)' }}>{fmt(Math.round(finalCash))}</strong></span>
            <span>LT at yr {years}: <strong style={{ color:'var(--ink)', fontFamily:'var(--mono)' }}>{fmt(Math.round(finalLT))}</strong></span>
            {startDebt > 0 && <span>Debt at yr {years}: <strong style={{ color:'var(--warn)', fontFamily:'var(--mono)' }}>{finalDebt > 0 ? fmt(Math.round(finalDebt)) : 'Paid off'}</strong></span>}
          </div>
        </div>

        <div className="plan-controls">
          <div style={{ fontSize:10.5, textTransform:'uppercase', letterSpacing:'0.12em', color:'var(--muted)', padding:'0 2px 2px' }}>Monthly contributions</div>
          <Slider compact label="Cash savings / month"          value={cashContrib}        min={0} max={5000}   step={50}   format={v => fmt(v, { zero:'$0' })} onChange={setCashContrib}        ends={['$0','$5k']} />
          <Slider compact label="Long-term investments / month" value={ltContrib}          min={0} max={5000}   step={50}   format={v => fmt(v, { zero:'$0' })} onChange={setLtContrib}          ends={['$0','$5k']} />
          <Slider compact label="Debt payment / month"         value={debtPaymentMonthly} min={0} max={10000}  step={50}   format={v => fmt(v, { zero:'$0' })} onChange={setDebtPaymentMonthly} ends={['$0','$10k']} />
          <div style={{ fontSize:10.5, textTransform:'uppercase', letterSpacing:'0.12em', color:'var(--muted)', padding:'6px 2px 2px' }}>Annual yields</div>
          <Slider compact label="Cash yield"                   value={cashYield}          min={0} max={10}     step={0.25} format={v => v.toFixed(2) + '%'}    onChange={updateCashYield}       ends={['0%','10%']} />
          <Slider compact label="Long-term investment yield"   value={ltYield}            min={0} max={15}     step={0.25} format={v => v.toFixed(2) + '%'}    onChange={updateLtYield}         ends={['0%','15%']} />
          <div style={{ fontSize:10.5, textTransform:'uppercase', letterSpacing:'0.12em', color:'var(--muted)', padding:'6px 2px 2px' }}>Starting balances</div>
          <Slider compact label="Starting cash balance"        value={startCash}          min={0} max={500000} step={500}  format={v => fmt(v, { zero:'$0' })} onChange={setStartCash}          ends={['$0','$500k']} />
          <Slider compact label="Starting long-term balance"  value={startLT}            min={0} max={1000000} step={1000} format={v => fmt(v, { zero:'$0' })} onChange={setStartLT}           ends={['$0','$1M']} />
          <Slider compact label="Starting debt balance"       value={startDebt}          min={0} max={1000000} step={1000} format={v => fmt(v, { zero:'$0' })} onChange={setStartDebt}         ends={['$0','$1M']} />
          <div style={{ fontSize:10.5, textTransform:'uppercase', letterSpacing:'0.12em', color:'var(--muted)', padding:'6px 2px 2px' }}>Time horizon</div>
          <Slider compact label="Years to project"             value={years}              min={1} max={40}     step={1}    format={v => v + ' years'}           onChange={setYears}              ends={['1 yr','40 yrs']} />
        </div>
      </div>

      <div className="milestones">
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
          <h3 style={{ fontFamily:'var(--serif)', fontWeight:400, fontSize:22, margin:0, letterSpacing:'-0.01em' }}>Milestones at this rate</h3>
          <button className="btn" onClick={() => setShowMilestoneModal(true)}>+ Add milestone</button>
        </div>

        {presetMilestones.map(m => {
          const eta = monthsToReachTotal(m.target);
          /* Fix 3.4: asset milestones use cash+LT for BOTH the % and the ETA sim
             (the ETA function already ignores debt); the Debt-free row covers debt. */
          const p   = Math.min(100, Math.round(((finalCash + finalLT) / m.target) * 100));
          return (
            <div className="milestone-row" key={m.name}>
              <div className="ms-name"><strong>{m.name}</strong><span>{m.detail} &middot; {fmt(Math.round(m.target))}</span></div>
              <div className="ms-eta">{eta == null ? '—' : formatEta(eta)}{eta != null && eta > 0 && <span className="unit">to reach</span>}</div>
              <div className="ms-pct">{p}% by yr {years}</div>
            </div>
          );
        })}

        {/* Debt Free milestone (replaces Sabbatical) */}
        {(() => {
          if (startDebt <= 0) {
            return (
              <div className="milestone-row">
                <div className="ms-name"><strong>Debt free</strong><span>No debt balance set</span></div>
                <div className="ms-eta">now</div>
                <div className="ms-pct">100%</div>
              </div>
            );
          }
          const eta       = monthsToBeDebtFree(startDebt, debtInterestRate, debtPaymentMonthly);
          const paidSoFar = startDebt - finalDebt;
          const p         = Math.min(100, startDebt > 0 ? Math.round((paidSoFar / startDebt) * 100) : 100);
          return (
            <div className="milestone-row">
              <div className="ms-name">
                <strong>Debt free</strong>
                <span>{fmt(Math.round(startDebt))} @ {debtInterestRate.toFixed(1)}% interest &middot; {fmt(debtPaymentMonthly, { zero:'$0' })}/mo payment</span>
              </div>
              <div className="ms-eta">
                {eta == null ? '—' : formatEta(eta)}
                {eta != null && eta > 0 && <span className="unit">to reach</span>}
              </div>
              <div className="ms-pct">{p}% paid by yr {years}</div>
            </div>
          );
        })()}

        {customMilestones.length > 0 && (
          <div style={{ borderTop:'1px solid var(--line)', marginTop:12, paddingTop:4 }}>
            <div style={{ fontSize:10.5, textTransform:'uppercase', letterSpacing:'0.12em', color:'var(--muted)', margin:'8px 0 4px' }}>Custom milestones</div>
            {customMilestones.map(m => {
              const isInvest  = m.accountType === 'invest';
              const mRate     = (isInvest ? ltYield : cashYield) / 100 / 12;
              const mContrib  = isInvest ? ltContrib  : cashContrib;
              const mStartBal = m.startBalance != null ? m.startBalance : (isInvest ? startLT : startCash);
              const eta       = monthsToReachAccount(m.target, mStartBal, mContrib, mRate);
              const mFinal    = isInvest ? finalLT : finalCash;
              const p         = Math.min(100, Math.round((mFinal / m.target) * 100));
              return (
                <div className="milestone-row" key={m.id}>
                  <div className="ms-name">
                    <strong>{m.name}</strong>
                    <span>
                      {m.detail ? m.detail + ' \xB7 ' : ''}{fmt(Math.round(m.target))}
                      <span style={{ marginLeft:8, color:'var(--muted)', fontSize:11, background:'var(--bg-soft)', padding:'1px 6px', borderRadius:999 }}>{isInvest ? 'invest' : 'cash'}</span>
                    </span>
                  </div>
                  <div className="ms-eta">{eta == null ? '—' : formatEta(eta)}{eta != null && eta > 0 && <span className="unit">to reach</span>}</div>
                  <div className="ms-pct" style={{ display:'flex', alignItems:'center', gap:8, justifyContent:'flex-end' }}>
                    <span>{p}% by yr {years}</span>
                    <button onClick={() => setCustomMilestones(ms => ms.filter(x => x.id !== m.id))}
                      style={{ color:'var(--muted)', fontSize:15, lineHeight:1, cursor:'pointer', padding:'2px 4px' }}
                      onMouseEnter={e => { e.currentTarget.style.color='var(--warn)'; }}
                      onMouseLeave={e => { e.currentTarget.style.color='var(--muted)'; }}>&#215;</button>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>

      <div className="foot-note">
        <span>Projections assume steady monthly contributions and returns; values are nominal dollars.</span>
        <span>Compounded monthly &middot; Cash and long-term accounts tracked separately</span>
      </div>

      {showMilestoneModal && (
        <AddMilestoneModal
          defaultStartCash={startCash} defaultStartLT={startLT}
          onSave={m => setCustomMilestones(ms => [...ms, m])}
          onClose={() => setShowMilestoneModal(false)} />
      )}
    </div>
  );
}

function AddMilestoneModal({ defaultStartCash, defaultStartLT, onSave, onClose }) {
  const [name,        setName]        = React.useState('');
  const [detail,      setDetail]      = React.useState('');
  const [target,      setTarget]      = React.useState('');
  const [accountType, setAccountType] = React.useState('invest');
  const [startBal,    setStartBal]    = React.useState('');
  const [err,         setErr]         = React.useState('');

  const handleSave = () => {
    if (!name.trim()) { setErr('Enter a milestone name.'); return; }
    const t = parseFloat(target);
    if (!target || isNaN(t) || t <= 0) { setErr('Enter a valid goal amount greater than zero.'); return; }
    onSave({ id: uid(), name: name.trim(), detail: detail.trim(), target: t, accountType, startBalance: startBal !== '' ? parseFloat(startBal) : null });
    onClose();
  };

  const ph = accountType === 'invest'
    ? 'Default: ' + fmt(defaultStartLT, { zero:'$0' }) + ' (LT balance)'
    : 'Default: ' + fmt(defaultStartCash, { zero:'$0' }) + ' (cash balance)';

  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) handleSave(); }}>
        <div className="modal-head"><h2>Add milestone</h2><button className="modal-close" aria-label="Close" onClick={onClose}>&#215;</button></div>
        <div className="form-field">
          <label>Milestone name</label>
          <input type="text" className="form-input" value={name} onChange={e => setName(e.target.value)} autoFocus placeholder="e.g. Beach house fund" />
        </div>
        <div className="form-field">
          <label>Description <span style={{ color:'var(--muted)', textTransform:'none', letterSpacing:0 }}>(optional)</span></label>
          <input type="text" className="form-input" value={detail} onChange={e => setDetail(e.target.value)} placeholder="Brief description" />
        </div>
        <div className="form-field">
          <label>Goal amount ($)</label>
          <input type="number" inputMode="decimal" className="form-input" value={target} onChange={e => setTarget(e.target.value)} placeholder="0" min="0" step="100" />
        </div>
        <div className="form-field">
          <label>Account type</label>
          <select className="form-input" value={accountType} onChange={e => setAccountType(e.target.value)}>
            <option value="invest">Investment Account (long-term yield + LT contribution)</option>
            <option value="cash">Cash Account (cash yield + cash contribution)</option>
          </select>
        </div>
        <div className="form-field">
          <label>Starting balance <span style={{ color:'var(--muted)', textTransform:'none', letterSpacing:0 }}>(optional)</span></label>
          <input type="number" inputMode="decimal" className="form-input" value={startBal} onChange={e => setStartBal(e.target.value)} placeholder={ph} min="0" step="100" />
        </div>
        {err && <div className="form-error">{err}</div>}
        <div className="modal-actions">
          <button className="btn" onClick={onClose}>Cancel</button>
          <button className="btn primary" onClick={handleSave}>Add milestone</button>
        </div>
      </div>
    </div>
  );
}

function formatEta(m) {
  if (m === 0) return 'now';
  const y = Math.floor(m / 12), mo = m % 12;
  if (y === 0)  return mo + ' mo';
  if (mo === 0) return y + ' yr' + (y > 1 ? 's' : '');
  return y + 'y ' + mo + 'm';
}
function niceCeil(n) {
  if (n <= 0) return 1000;
  const exp = Math.pow(10, Math.floor(Math.log10(n))), f = n / exp;
  return (f <= 1 ? 1 : f <= 2 ? 2 : f <= 5 ? 5 : 10) * exp;
}
function abbrev(n) {
  if (n >= 1e6) return '$' + (n / 1e6).toFixed(n >= 1e7 ? 0 : 1) + 'M';
  if (n >= 1e3) return '$' + Math.round(n / 1e3) + 'k';
  return '$' + Math.round(n);
}

function Slider({ label, value, min, max, step, format, onChange, ends, compact }) {
  return (
    <div className="control" style={compact ? { padding:'9px 14px' } : undefined}>
      <div className="lbl">{label}</div>
      <div className="val" style={compact ? { fontSize:20, marginBottom:6 } : undefined}>{format(value)}</div>
      <input type="range" min={min} max={max} step={step} value={value} onChange={e => onChange(parseFloat(e.target.value))} />
      <div className="ends"><span>{ends[0]}</span><span>{ends[1]}</span></div>
    </div>
  );
}

function ProjectionChart({ series, years }) {
  const W=640, H=260, PL=56, PR=12, PT=16, PB=28;
  const maxBal=Math.max(...series.map(p=>p.bal),1), niceMax=niceCeil(maxBal);
  const x=m=>PL+(m/(series.length-1))*(W-PL-PR);
  const y=b=>PT+(1-b/niceMax)*(H-PT-PB);
  const path=series.map((p,i)=>(i?'L':'M')+x(p.m).toFixed(1)+' '+y(p.bal).toFixed(1)).join(' ');
  const areaPath=path+' L '+x(series.length-1).toFixed(1)+' '+(H-PB).toFixed(1)+' L '+x(0).toFixed(1)+' '+(H-PB).toFixed(1)+' Z';
  const tickVals=Array.from({length:5},(_,i)=>(niceMax*i)/4);
  const xTickCount=Math.min(years,8);
  const xTicks=Array.from({length:xTickCount+1},(_,i)=>Math.round((years*i)/xTickCount));
  return (
    <svg viewBox={'0 0 ' + W + ' ' + H} style={{ width:'100%', height:'auto', display:'block' }}>
      <defs>
        <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stopColor="var(--accent)" stopOpacity="0.18" />
          <stop offset="100%" stopColor="var(--accent)" stopOpacity="0" />
        </linearGradient>
      </defs>
      {tickVals.map((v,i)=>(
        <g key={i}>
          <line x1={PL} x2={W-PR} y1={y(v)} y2={y(v)} stroke="var(--line)" strokeWidth="1" />
          <text x={PL-8} y={y(v)+4} textAnchor="end" fontSize="11" fill="var(--muted)" fontFamily="var(--mono)">{abbrev(v)}</text>
        </g>
      ))}
      {xTicks.map((yr,i)=>(
        <text key={i} x={x(yr*12)} y={H-10} textAnchor="middle" fontSize="11" fill="var(--muted)" fontFamily="var(--mono)">{yr===0?'now':'y'+yr}</text>
      ))}
      <path d={areaPath} fill="url(#areaGrad)" />
      <path d={path} fill="none" stroke="var(--accent)" strokeWidth="2" />
      <circle cx={x(series.length-1)} cy={y(series[series.length-1].bal)} r="4" fill="var(--accent)" stroke="var(--surface)" strokeWidth="2" />
    </svg>
  );
}
  </script>

  <script type="text/babel">
/* ---- App shell ---- */
function App() {
  /* Fix 1.1: remember the active tab and viewed month across refreshes. */
  const [screen,   setScreen]   = React.useState(() => {
    try { const s = localStorage.getItem('ledger.ui.screen'); if (['budget','track','plan'].includes(s)) return s; } catch (_) {}
    return 'budget';
  });
  const [monthIdx, setMonthIdx] = React.useState(() => {
    try { const m = parseInt(localStorage.getItem('ledger.ui.month'), 10); if (m >= 0 && m <= 11) return m; } catch (_) {}
    return Math.min(new Date().getMonth(), 11);
  });
  const [showDataMenu,      setShowDataMenu]      = React.useState(false);   // Fix #3
  const [pendingLogExpense, setPendingLogExpense] = React.useState(false);   // Fix #3 (FAB)
  const [data,     setData]     = React.useState(() => {
    try {
      const raw = localStorage.getItem('ledger.data.v2');
      if (raw) { const p = JSON.parse(raw); if (p && p.groups) return migrateData(p); }
    } catch (_) {}
    return { ...STARTER_DATA };
  });

  React.useEffect(() => {
    try { localStorage.setItem('ledger.data.v2', JSON.stringify(data)); } catch (_) {}
  }, [data]);
  React.useEffect(() => { try { localStorage.setItem('ledger.ui.screen', screen); } catch (_) {} }, [screen]);
  React.useEffect(() => { try { localStorage.setItem('ledger.ui.month', String(monthIdx)); } catch (_) {} }, [monthIdx]);

  /* Fix 2.2: one-time notice that Ledger keeps a single budget across years. */
  const changeYear = (delta) => {
    try {
      if (!localStorage.getItem('ledger.notice.year')) {
        alert('Ledger keeps one budget. Changing the year relabels it and shows only that year’s logged expenses.');
        localStorage.setItem('ledger.notice.year', '1');
      }
    } catch (_) {}
    setData(d => ({ ...d, year: d.year + delta }));
  };

  const exportData = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'ledger-' + data.year + '.json'; a.click(); URL.revokeObjectURL(a.href);
  };

  const importData = () => {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json';
    input.onchange = e => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const p = JSON.parse(ev.target.result);
          if (p && p.groups) setData(migrateData(p));
          else alert("This doesn't look like a Ledger data file.");
        } catch (_) { alert('Could not parse the file.'); }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  const resetData = () => {
    if (confirm('Reset to starter data? All your budget and transactions will be lost.'))
      setData({ ...STARTER_DATA, year: new Date().getFullYear() });
  };

  const initials = (data.name || 'Me').trim().split(/\s+/).map(w => w[0] || '').join('').toUpperCase().slice(0, 2) || 'ME';

  return (
    <div className="app">
      <header className="topbar">
        <div className="brand">
          <span className="brand-mark"></span>
          <span className="brand-name">Ledger</span>
        </div>
        <nav className="nav">
          {[['budget','Budget'],['track','Track'],['plan','Plan']].map(([k, label]) => (
            <button key={k} className={screen === k ? 'active' : ''} onClick={() => setScreen(k)}>{label}</button>
          ))}
        </nav>
        <div className="topbar-right">
          <div className="year-pill">
            <button onClick={() => changeYear(-1)} aria-label="Previous year">‹</button>
            <span>{data.year}</span>
            <button onClick={() => changeYear(1)} aria-label="Next year">›</button>
          </div>
          <div className="desktop-data-actions">
            <button className="btn ghost" style={{ fontSize:12, padding:'5px 12px' }} onClick={exportData}>Export</button>
            <button className="btn ghost" style={{ fontSize:12, padding:'5px 12px' }} onClick={importData}>Import</button>
            <button className="btn ghost" style={{ fontSize:12, padding:'5px 12px' }} onClick={resetData}>Reset</button>
          </div>
          <div className="avatar" title={data.name || 'Me'}>{initials}</div>
        </div>
      </header>
      <main className="main">
        {screen === 'budget' && <BudgetScreen data={data} setData={setData} />}
        {screen === 'track'  && <TrackScreen  data={data} setData={setData} monthIdx={monthIdx} setMonthIdx={setMonthIdx}
                                    autoLog={pendingLogExpense} onAutoLogHandled={() => setPendingLogExpense(false)} />}
        {screen === 'plan'   && <PlanScreen   data={data} setData={setData} />}
      </main>

      {/* Fix #3 — mobile bottom tab bar (hidden on desktop via CSS) */}
      <nav className="bottom-nav">
        <button className={screen === 'budget' ? 'active' : ''} onClick={() => setScreen('budget')}>
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><rect x="3" y="4" width="14" height="12" rx="2"/><line x1="3" y1="8" x2="17" y2="8"/><line x1="9" y1="8" x2="9" y2="16"/></svg>
          <span>Budget</span>
        </button>
        <button className={screen === 'track' ? 'active' : ''} onClick={() => setScreen('track')}>
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><circle cx="10" cy="10" r="7"/><line x1="10" y1="10" x2="10" y2="3.5"/><line x1="10" y1="10" x2="15.4" y2="13.2"/></svg>
          <span>Track</span>
        </button>
        <button className={screen === 'plan' ? 'active' : ''} onClick={() => setScreen('plan')}>
          <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><polyline points="3,14 8,9 12,12 17,5"/><line x1="3" y1="17" x2="17" y2="17"/></svg>
          <span>Plan</span>
        </button>
        <button onClick={() => setShowDataMenu(true)}>
          <svg viewBox="0 0 20 20" fill="currentColor" stroke="none"><circle cx="5" cy="10" r="1.5"/><circle cx="10" cy="10" r="1.5"/><circle cx="15" cy="10" r="1.5"/></svg>
          <span>More</span>
        </button>
      </nav>

      {/* Fix #3 — mobile FAB for Log expense (hidden on desktop via CSS) */}
      <button className="fab" aria-label="Log expense" title="Log expense"
        onClick={() => { setScreen('track'); setPendingLogExpense(true); }}>+</button>

      {/* Fix #3 — Data / More menu (Export / Import / Reset) */}
      {showDataMenu && (
        <div className="data-menu-overlay" onClick={() => setShowDataMenu(false)}>
          <div className="data-menu" onClick={e => e.stopPropagation()}>
            <div className="dm-head">
              <h4>Data</h4>
              <button className="modal-close" onClick={() => setShowDataMenu(false)} aria-label="Close">&#215;</button>
            </div>
            <button className="dm-item" onClick={() => { setShowDataMenu(false); exportData(); }}><span className="dm-ico">&#8595;</span>Export data (.json)</button>
            <button className="dm-item" onClick={() => { setShowDataMenu(false); importData(); }}><span className="dm-ico">&#8593;</span>Import data (.json)</button>
            <button className="dm-item" onClick={() => { setShowDataMenu(false); resetData(); }}><span className="dm-ico">&#8635;</span>Reset to starter data</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />); /* mount v2026-07-03 */
  </script>
</body>
