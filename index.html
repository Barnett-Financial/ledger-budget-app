  <!-- Cloud sync: per-person login + private budgets (Supabase). Keys here are publishable/safe. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.LEDGER_SB = {
      url: 'https://bmhzvokxpglsdcrdbmra.supabase.co',
      key: 'sb_publishable_RJt0kYtW87BaHLEglQxkaw_egxReKyT'
    };
    try {
      window.sb = (window.supabase && window.supabase.createClient)
        ? window.supabase.createClient(window.LEDGER_SB.url, window.LEDGER_SB.key)
        : null;
    } catch (_) { window.sb = null; }
  </script>

<body>
  <div id="root"></div>

  <!-- data first: defines window globals (helpers, constants, starter data) -->
  <script src="data.js?v=20260716"></script>

  <!-- Components (in-browser Babel). Load order: shared → screens → app/mount last.
       2026-07-16: added ?v=... cache-busting query strings on every local asset
       (styles.css, data.js, all js/*.jsx) — styles.css was found stuck on a stale
       cached copy across several deploys (browser/CDN kept serving the old file
       since the URL never changed) while the .jsx files happened to update fine.
       Bump this version string whenever any of these files change, so it's never
       ambiguous whether a deploy actually reached the browser. -->
  <script type="text/babel" src="js/shared.jsx?v=20260716"></script>
  <script type="text/babel" src="js/budget.jsx?v=20260720b"></script>
  <script type="text/babel" src="js/track.jsx?v=20260720a"></script>
  <script type="text/babel" src="js/plan.jsx?v=20260716"></script>
  <script type="text/babel" src="js/app.jsx?v=20260720a"></script>
